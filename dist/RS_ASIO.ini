[Config]
; for "EnableWasapiOutputs" you can use -1 to have a message prompting
; to use either WASAPI or ASIO for output every time you boot the game
EnableWasapiOutputs=0
; WASAPI input support is currently only used for Ubisoft's Real Tone Cable
; but you can enable it for other capture devices if you want to redirect them to ASIO as well.
EnableWasapiInputs=1
EnableAsio=1

[Asio]
; available buffer size modes:
; driver - respect buffer size setting set in the driver
; host   - use a buffer size as close as possible as that requested by the host application
; custom - use the buffer size specified in CustomBufferSize field
BufferSizeMode=driver
CustomBufferSize=

; if your game hangs or crashes on exit, try setting "EnableRefCountHack" to true.
; when blank or invalid, the value of "EnableRefCountHack" will be interpreted as
; true if RS ASIO detects the usage of Asio4All.
; the same applies for all inputs.
; 
; driver set to "wineasio-rsasio", for running Rocksmith 2011 in Linux/Steam/Proton
[Asio.Output]
Driver=wineasio-rsasio
BaseChannel=0
AltBaseChannel=
EnableSoftwareEndpointVolumeControl=1
EnableSoftwareMasterVolumeControl=1
SoftwareMasterVolumePercent=100
EnableRefCountHack=

[Asio.Input.0]
Driver=wineasio-rsasio
Channel=0
; Set WasapiDevice to identify the Real Tone Cable (or any WASAPI capture device to redirect to ASIO).
; The value is matched as a case-insensitive substring against BOTH the device ID and its friendly name.
; You can use either:
;   - A GUID fragment from the device ID, e.g. 21D5646C-D708-4E90-A57A-E1956015D4F3
;     (or just 21D5646C, or D708, etc.)
;   - A friendly name substring, e.g. "Rocksmith"
;     (which would match the actual friendly name "Rocksmith Guitar Adapter Mono")
; To find the right value, run the game once with this line set to something invalid, then open
; RS_ASIO.log and look for "friendly name:" lines to see what each capture device is called.
WasapiDevice=Rocksmith
EnableSoftwareEndpointVolumeControl=1
EnableSoftwareMasterVolumeControl=1
SoftwareMasterVolumePercent=100
EnableRefCountHack=

[Asio.Input.1]
Driver=wineasio-rsasio
Channel=1
EnableSoftwareEndpointVolumeControl=1
EnableSoftwareMasterVolumeControl=1
SoftwareMasterVolumePercent=100
EnableRefCountHack=

[Asio.Input.Mic]
Driver=wineasio-rsasio
Channel=1
EnableSoftwareEndpointVolumeControl=1
EnableSoftwareMasterVolumeControl=1
SoftwareMasterVolumePercent=100
EnableRefCountHack=